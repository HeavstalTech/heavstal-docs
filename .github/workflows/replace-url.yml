name: Replace Old Domain

on:
  workflow_dispatch: # Allows you to trigger this manually from the Actions tab

jobs:
  replace-urls:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants permission to commit and push changes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to push changes back

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Node.js Search and Replace
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const oldUrl = /https:\/\/heavstal-tech\.vercel\.app/g;
          const newUrl = 'https://heavstal.com.ng';

          function replaceInFiles(dir) {
            const files = fs.readdirSync(dir);
            for (const file of files) {
              // Ignore git history and dependencies to prevent corruption/slowness
              if (file === '.git' || file === 'node_modules') continue;
              
              const filePath = path.join(dir, file);
              const stat = fs.statSync(filePath);
              
              if (stat.isDirectory()) {
                replaceInFiles(filePath);
              } else if (stat.isFile()) {
                try {
                  const content = fs.readFileSync(filePath, 'utf8');
                  
                  // Skip binary files (like images/fonts) by checking for null bytes
                  if (content.includes('\u0000')) continue; 
                  
                  // If the old URL exists anywhere in the file, replace it
                  if (oldUrl.test(content)) {
                    const newContent = content.replace(oldUrl, newUrl);
                    fs.writeFileSync(filePath, newContent, 'utf8');
                    console.log(\`Updated: \${filePath}\`);
                  }
                } catch (e) {
                  // Silently skip files that cannot be read as standard text
                }
              }
            }
          }

          console.log('Starting search and replace...');
          replaceInFiles('.');
          console.log('Finished!');
          "

      - name: Commit and Push Changes
        run: |
          # Configure standard GitHub Actions bot credentials
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage all modified files
          git add .
          
          # Check if there are any changes to commit
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: replace heavstal-tech.vercel.app with heavstal.com.ng"
            git push
            echo "Changes successfully pushed to the repository."
          else
            echo "No files needed updating."
          fi
