name: Replace Old Domain

on:
  workflow_dispatch: 

jobs:
  replace-urls:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Node.js Search and Replace
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const oldUrl = /heavstal-tech\.vercel\.app/g;
          const newDomain = 'heavstal.com.ng';

          function replaceInFiles(dir) {
            const files = fs.readdirSync(dir);
            for (const file of files) {
              
              // FIX: Now explicitly ignoring the '.github' folder so GitHub doesn't block the push!
              if (file === '.git' || file === 'node_modules' || file === '.next' || file === '.github') continue;
              
              const filePath = path.join(dir, file);
              const stat = fs.statSync(filePath);
              
              if (stat.isDirectory()) {
                replaceInFiles(filePath);
              } else if (stat.isFile()) {
                try {
                  const content = fs.readFileSync(filePath, 'utf8');
                  
                  if (content.includes('\u0000')) continue; 
                  
                  if (oldUrl.test(content)) {
                    const newContent = content.replace(oldUrl, newDomain);
                    fs.writeFileSync(filePath, newContent, 'utf8');
                    console.log(\`Updated: \${filePath}\`);
                  }
                } catch (e) {
                  // Silently skip files that cannot be read
                }
              }
            }
          }

          console.log('Starting search and replace...');
          replaceInFiles('.');
          console.log('Finished!');
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: replace heavstal-tech.vercel.app with heavstal.com.ng"
            git push
            echo "Changes successfully pushed to the repository."
          else
            echo "No files needed updating."
          fi
